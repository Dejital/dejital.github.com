---
layout: default
---
<div class="content">

<article>
  {% if page.image %}
  <img src="{{ page.image }}" alt="{{ page.title }}" class="article-header-img pure-img">
  {% endif %}

  {{ content }}
</article>

<nav>
  <div class="post-nav-row">
    <div class="previous">
      {% if page.previous.url %}
        <a class="pure-button" href="{{page.previous.url}}">&#8592; Previous</a>
      {% endif %}
    </div>

    <div class="next">
      {% if page.next.url %}
        <a class="pure-button" href="{{page.next.url}}">Next &#8594;</a>
      {% endif %}
    </div>
  </div>
</nav>

{% include newsletter.html %}

</div>
