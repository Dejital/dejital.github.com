<!DOCTYPE html>
<html lang="en">
    <head>
        {% comment %}
          analytics: create a GoatCounter account (free, no cookie banner) and
          add its script here — placeholder below.
        {% endcomment %}
        <!-- <script data-goatcounter="https://SITECODE.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script> -->
        <title>{% if page.title %}{{page.title}} | {% endif %}Serge Nevsky</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="theme-color" content="#3f51b5">
        {% seo title=false %}
        {% feed_meta %}
        <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
        <link rel="manifest" href="/manifest.json">
        <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#3f51b5">
        <link rel="stylesheet" href="/assets/css/screen.css">
    </head>
    <body>
        <div id="top">
            <header>
                <a href="/" id="left-header" class="nav-item side" style="text-align: left;">
                    ←  Home
                </a>
              <a href="/blog" id="blog-left-header" class="nav-item side" style="text-align: left;">
                ←  Home
              </a>
              <a href="/" id="site-header" class="nav-item">
                <span>
                  Serge Nevsky
                </span>
              </a>
              <a href="/blog/" id="blog-header" class="nav-item">
                <span>
                  Serge Nevsky / Blog
                </span>
              </a>
              <div class="nav-item side" id="empty-side-header">
              </div>
            </header>
            {{content}}
            <footer>
                <a href="#top">&uarr;</a>
            </footer>
        </div>
    </body>
</html>
