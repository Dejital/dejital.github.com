title: Serge Nevsky
description: Agent-native engineering. Running fleets of AI agents that ship production software. Serge Nevsky, software engineer at Meta.
url: https://snevsky.com
author: Serge Nevsky
permalink: "/blog/:title"
plugins: [jekyll-feed, jekyll-seo-tag, jekyll-sitemap]
highlighter: rouge

# Default og:image for static pages only (posts render page.image as a header
# image in _layouts/post.html, so a site-wide default would leak into post bodies).
defaults:
  - scope:
      path: ""
      type: pages
    values:
      image: /assets/img/og-card.jpg
  - scope:
      path: ""
      type: posts
    values:
      kicker: Essay
